spring:

  application:
    name: orders-platform
  jackson:
    serialization:
      write-dates-as-timestamps: false
server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  level:
    com.bancolombia: DEBUG